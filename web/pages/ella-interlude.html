<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ella — Desert Survival Study</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
</head>
<body>
<div class="page ella-page">
  <div class="ella-card">

    <div class="ella-icon">
      <div class="ella-ring"></div>
      <div class="ella-ring"></div>
      <div class="ella-ring"></div>
      <div class="ella-avatar">🤖</div>
    </div>

    <h1 class="ella-title">Ella has some thoughts!</h1>

    <!-- Step 1: before ready -->
    <div id="step-ready">
      <p class="ella-sub">When you're ready to hear Ella's thoughts, press the button below.</p>
      <button class="btn btn-primary" onclick="onReady()" style="max-width:320px; margin:0 auto;">
        I'm Ready
      </button>
    </div>

    <!-- Step 2: Ella speaking -->
    <div id="step-speaking" style="display:none;">
      <p class="ella-sub">Look at Ella.<br>Continue when you've heard her opinions.</p>
      <div class="ella-dots">
        <div class="ella-dot"></div>
        <div class="ella-dot"></div>
        <div class="ella-dot"></div>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='ranking-post.html'" style="max-width:320px; margin:0 auto; margin-bottom:12px;">
        Continue
      </button>
      <button class="btn" onclick="hearAgain()" style="max-width:320px; margin:0 auto; background:#F3F4F6; color:#374151; font-size:14px;">
        🔁 Hear Again
      </button>
    </div>

  </div>
</div>

<script src="../scripts/session.js"></script>
<script>
  requireSession('participantId', 'initialChoice');

  const choice = Session.get('initialChoice');

  function publishChoice() {
    const ros = new ROSLIB.Ros({ url: 'ws://localhost:9090' });
    ros.on('connection', () => {
      const topic = new ROSLIB.Topic({
        ros: ros,
        name: '/participant_choice',
        messageType: 'std_msgs/msg/String'
      });
      topic.publish(new ROSLIB.Message({ data: choice }));
      console.log('Published to /participant_choice:', choice);
    });
    ros.on('error', (e) => console.error('ROS error:', e));
  }

  function onReady() {
    document.getElementById('step-ready').style.display = 'none';
    document.getElementById('step-speaking').style.display = 'block';
    publishChoice();
  }

  function hearAgain() {
    publishChoice();
  }
</script>
</body>
</html>
