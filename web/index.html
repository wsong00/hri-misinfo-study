<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRI Study — Experimenter Panel</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
<div class="admin-page">
  <div class="admin-card">
    <div class="admin-tag">HRI Study — Experimenter Panel</div>
    <h1 style="font-size:20px; margin-bottom:6px;">New Session</h1>
    <p style="font-size:13px; color:#6B7280; margin-bottom:28px;">Set up a participant session before handing the screen to the participant.</p>

    <div class="form-group">
      <label class="form-label" for="pid">Participant ID</label>
      <input type="text" id="pid" class="form-input" placeholder="e.g. P001" autocomplete="off" />
    </div>

    <div class="form-group">
      <label class="form-label">Condition</label>
      <div class="condition-row">
        <button class="condition-btn selected" data-condition="robot" onclick="selectCondition('robot')">Robot</button>
        <button class="condition-btn" data-condition="control" onclick="selectCondition('control')" style="opacity:0.45;" disabled title="Not yet available">Control</button>
      </div>
      <p style="font-size:11px; color:#9CA3AF; margin-top:6px;">Control condition coming in a future version.</p>
    </div>

    <p class="error-msg" id="error-msg">Please enter a Participant ID before starting.</p>

    <button class="btn btn-primary" onclick="beginSession()" style="margin-top:8px;">Begin Session</button>
  </div>
</div>

<script src="scripts/session.js"></script>
<script>
  let selectedCondition = 'robot';

  function selectCondition(c) {
    selectedCondition = c;
    document.querySelectorAll('.condition-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.condition === c);
    });
  }

  function beginSession() {
    const pid = document.getElementById('pid').value.trim();
    if (!pid) {
      document.getElementById('error-msg').style.display = 'block';
      return;
    }
    Session.clear();
    Session.set('participantId', pid);
    Session.set('condition', selectedCondition);
    Session.set('sessionStart', new Date().toISOString());
    window.location.href = 'pages/desert-task.html';
  }
</script>
</body>
</html>
